# =============================================
# E-Voter Backend Configuration
# =============================================

# ── Server ────────────────────────────────────
# The port our Spring Boot app runs on.
# React (port 3000) will call this backend.
server.port=8080

# ── MySQL Database ────────────────────────────
# Replace <your_password> with your MySQL root password.
spring.datasource.url=jdbc:mysql://localhost:3306/evoter
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────
# validate  — checks DB matches entities (use in production)
# update    — auto-updates schema (safe for development)
# create    — drops and recreates schema on every restart (dev only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────
# Secret key used to sign JWT tokens (min 32 chars for HS256).
# IMPORTANT: Use a strong random secret in production and
# store it in environment variables, NOT in this file.
jwt.secret=evoter_super_secret_key_change_in_production_2024
# Token validity in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000

# ── CORS ──────────────────────────────────────
# Allowed origins for cross-origin requests from React app
allowed.origins=http://localhost:3000

# ── Jackson ──────────────────────────────────
# Serialize LocalDateTime as ISO-8601 strings, not arrays.
# Fixes date rendering across all modules in the frontend.
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ───────────────────────────────────
logging.level.com.evoter=DEBUG
logging.level.org.springframework.security=INFO
spring.main.allow-circular-references=true